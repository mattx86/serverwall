services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    working_dir: /app
    command: cargo build
    profiles: ["build"]

  check:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    working_dir: /app
    command: cargo check
    profiles: ["check"]

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    working_dir: /app
    command: cargo test
    profiles: ["test"]

  clippy:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    working_dir: /app
    command: cargo clippy -- -D warnings
    profiles: ["clippy"]

  run:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    volumes:
      - serverwall-data:/opt/serverwall
    command: >
      sh -c "/opt/serverwall/bin/serverwall --init &&
             /opt/serverwall/bin/serverwall --config /opt/serverwall/etc/serverwall.toml"
    profiles: ["run"]

  release:
    build:
      context: .
      dockerfile: Dockerfile.release
    volumes:
      - ./dist:/dist
    profiles: ["release"]

volumes:
  cargo-cache:
  target-cache:
  serverwall-data:
