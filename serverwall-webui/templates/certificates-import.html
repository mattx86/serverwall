{% extends "base.html" %}
{% block title %}Import Certificate{% endblock %}
{% block content %}
    <div class="toolbar" style="margin-bottom:1rem">
      <h2 style="margin:0;flex:1">Import Certificate</h2>
      <a href="/ui/certificates.html" class="btn btn-secondary btn-sm">&#8592; Back</a>
    </div>
    <div class="form-panel">
      <div class="form-grid">
        <div class="form-group">
          <label>Name * (e.g. mysite)</label>
          <input type="text" id="iName" placeholder="mysite">
        </div>
        <div class="form-group">
          <label>Certificate PEM *</label>
          <input type="file" id="iCert" accept=".pem,.crt,.cer">
        </div>
        <div class="form-group">
          <label>Private Key PEM *</label>
          <input type="file" id="iKey" accept=".pem,.key">
        </div>
        <div class="form-group">
          <label>CA Chain PEM (optional)</label>
          <input type="file" id="iChain" accept=".pem,.crt,.cer">
        </div>
      </div>
      <div id="iError" class="form-error" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="importCert()">Import</button>
      </div>
    </div>
{% endblock %}
{% block scripts %}
<script>
async function importCert() {
  var name  = document.getElementById('iName').value.trim();
  var cert  = document.getElementById('iCert').files[0];
  var key   = document.getElementById('iKey').files[0];
  var errEl = document.getElementById('iError');
  if (!name || !cert || !key) {
    errEl.textContent = 'Name, certificate file, and key file are all required.';
    errEl.style.display = '';
    return;
  }
  var chain = document.getElementById('iChain').files[0];
  var fd = new FormData();
  fd.append('name', name);
  fd.append('cert', cert);
  fd.append('key', key);
  if (chain) fd.append('chain', chain);
  try {
    var tok = getCookie('lg_session');
    var hdrs = {};
    if (tok) hdrs['Authorization'] = 'Bearer ' + tok;
    var r = await fetch('/api/certs/import', {method: 'POST', headers: hdrs, body: fd});
    var res = await r.json();
    if (!r.ok) { errEl.textContent = res.error || 'Import failed'; errEl.style.display = ''; return; }
    alert('Certificate imported successfully.');
    window.location.href = '/ui/certificates.html';
  } catch(e) { errEl.textContent = 'Request failed: ' + e.message; errEl.style.display = ''; }
}

initPage('certs-import');
</script>
{% endblock %}
