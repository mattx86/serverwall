{% extends "base.html" %}
{% block title %}Frontends{% endblock %}
{% block content %}
    <div class="toolbar" id="feToolbar">
      <h2 style="margin:0;flex:1">Frontends</h2>
      <button class="btn btn-primary" id="addBtn" onclick="showAddForm()">+ Add Frontend</button>
    </div>

    <div id="addForm" class="form-panel" style="display:none">
      <h3>Add Frontend</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="fName" placeholder="e.g. web" oninput="autoFillLog()">
        </div>
        <div class="form-group">
          <label>Protocol *</label>
          <select id="fProtocol">
            <option value="https">HTTPS</option>
            <option value="smtps">SMTPS</option>
            <option value="smtpstarttls">SMTP+STARTTLS</option>
            <option value="imaps">IMAPS</option>
            <option value="tcp">TCP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Listen Addresses * (one per line)</label>
          <textarea id="fListen" placeholder="0.0.0.0:443"></textarea>
        </div>
        <div class="form-group">
          <label>Backend Pool *</label>
          <select id="fPool"><option value="">-- select pool --</option></select>
        </div>
        <div class="form-group">
          <label>Balancer</label>
          <select id="fBalancer" onchange="toggleStickyField()">
            <option value="round_robin">Round Robin</option>
            <option value="least_connections">Least Connections</option>
            <option value="ip_hash">IP Hash</option>
            <option value="sticky_session">Sticky Session</option>
          </select>
        </div>
        <div class="form-group" id="fStickyGroup" style="display:none">
          <label>Session Cookie Name</label>
          <input type="text" id="fStickyCookie" placeholder="SWSESSION">
        </div>
        <div class="form-group">
          <label>TLS Certificate</label>
          <select id="fTlsCertSelect" onchange="syncCertFields()">
            <option value="">-- none --</option>
          </select>
          <input type="hidden" id="fTlsCert">
          <input type="hidden" id="fTlsKey">
        </div>
        <div class="form-group">
          <label>WAF Ruleset</label>
          <select id="fWafRuleset"><option value="">-- none --</option></select>
        </div>
        <div class="form-group">
          <label>Security Profile</label>
          <select id="fSecurityProfile"><option value="">-- none --</option></select>
        </div>
        <div class="form-group">
          <label>TLS Profile</label>
          <select id="fTlsProfile"><option value="">-- none --</option></select>
        </div>
        <div class="form-group">
          <label>Logging Profile</label>
          <select id="fLogProfile"><option value="">-- none --</option></select>
        </div>
        <div class="form-group">
          <label>Max Connections (blank = unlimited)</label>
          <input type="number" id="fMaxConn" min="1" placeholder="">
        </div>
        <div class="form-group">
          <label>ACL Default Action</label>
          <select id="fAclDefault">
            <option value="allow">Allow</option>
            <option value="deny">Deny</option>
          </select>
        </div>
        <div class="form-group">
          <label>Log File</label>
          <input type="text" id="fLogFile" placeholder="/opt/serverwall/var/log/web.log">
        </div>
      </div>
      <div style="margin-top:.8rem">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem">HTTP Headers</label>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <label class="form-check"><input type="checkbox" id="fXFF" checked> X-Forwarded-For</label>
          <label class="form-check"><input type="checkbox" id="fXRI" checked> X-Real-IP</label>
          <label class="form-check"><input type="checkbox" id="fXFP" checked> X-Forwarded-Proto</label>
          <label class="form-check"><input type="checkbox" id="fWaf" checked> WAF Enabled</label>
        </div>
      </div>
      <div id="fError" class="form-error" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitFrontend()">Create Frontend</button>
        <button class="btn btn-secondary" onclick="hideAddForm()">Cancel</button>
      </div>
    </div>

    <table id="feTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Protocol</th>
          <th>Listen</th>
          <th>Backend Pool</th>
          <th>WAF</th>
          <th>Max Conn</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="feBody">
        <tr><td colspan="7">Loading...</td></tr>
      </tbody>
    </table>
{% endblock %}
{% block scripts %}
<script>
var _certMap = {};

function showAddForm() {
  document.getElementById('addForm').style.display = '';
  document.getElementById('feTable').style.display = 'none';
  document.getElementById('addBtn').style.display = 'none';
  document.getElementById('fError').style.display = 'none';
  populateDropdowns();
}
function hideAddForm() {
  document.getElementById('addForm').style.display = 'none';
  document.getElementById('feTable').style.display = '';
  document.getElementById('addBtn').style.display = '';
}

function toggleStickyField() {
  var isSticky = document.getElementById('fBalancer').value === 'sticky_session';
  document.getElementById('fStickyGroup').style.display = isSticky ? '' : 'none';
}

function autoFillLog() {
  var name = document.getElementById('fName').value.trim();
  var logEl = document.getElementById('fLogFile');
  if (name) {
    logEl.value = '/opt/serverwall/var/log/' + name + '.log';
  } else {
    logEl.value = '';
  }
}

function syncCertFields() {
  var sel = document.getElementById('fTlsCertSelect').value;
  if (sel && _certMap[sel]) {
    document.getElementById('fTlsCert').value = _certMap[sel].cert;
    document.getElementById('fTlsKey').value  = _certMap[sel].key;
  } else {
    document.getElementById('fTlsCert').value = '';
    document.getElementById('fTlsKey').value  = '';
  }
}

async function populateDropdowns() {
  // Pools
  try {
    var r = await fetch('/api/backends', {headers: authHeaders()});
    var d = await r.json();
    var poolSel = document.getElementById('fPool');
    poolSel.innerHTML = '<option value="">-- select pool --</option>';
    (d.pools || []).forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name;
      poolSel.appendChild(opt);
    });
  } catch(e) {}

  // WAF rulesets
  try {
    var r2 = await fetch('/api/waf', {headers: authHeaders()});
    var d2 = await r2.json();
    var wafSel = document.getElementById('fWafRuleset');
    wafSel.innerHTML = '<option value="">-- none --</option>';
    (d2.waf_rules || []).forEach(function(w, i) {
      var opt = document.createElement('option');
      opt.value = w.name; opt.textContent = w.name;
      if (i === 0) opt.selected = true;
      wafSel.appendChild(opt);
    });
  } catch(e) {}

  // Certificates
  try {
    var r3 = await fetch('/api/certs', {headers: authHeaders()});
    var d3 = await r3.json();
    var certSel = document.getElementById('fTlsCertSelect');
    certSel.innerHTML = '<option value="">-- none --</option>';
    _certMap = {};
    var certsDir = '/opt/serverwall/etc/certs/';
    (d3.certificates || []).forEach(function(c) {
      if (!c.key_exists) return;
      var opt = document.createElement('option');
      opt.value = c.name; opt.textContent = c.name + (c.expiry ? '  (exp: '+c.expiry+')' : '');
      certSel.appendChild(opt);
      _certMap[c.name] = {
        cert: certsDir + c.cert_file,
        key:  certsDir + c.key_file,
      };
    });
  } catch(e) {}

  // Security profiles
  try {
    var r4 = await fetch('/api/security-profiles', {headers: authHeaders()});
    var d4 = await r4.json();
    var profSel = document.getElementById('fSecurityProfile');
    profSel.innerHTML = '<option value="">-- none --</option>';
    (d4.profiles || []).forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name + (p.description ? ' — ' + p.description : '');
      profSel.appendChild(opt);
    });
  } catch(e) {}

  // TLS profiles
  try {
    var r5 = await fetch('/api/tls-profiles', {headers: authHeaders()});
    var d5 = await r5.json();
    var tlsSel = document.getElementById('fTlsProfile');
    tlsSel.innerHTML = '<option value="">-- none --</option>';
    (d5.profiles || []).forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name + (p.description ? ' — ' + p.description : '');
      tlsSel.appendChild(opt);
    });
  } catch(e) {}

  // Log profiles
  try {
    var r6 = await fetch('/api/log-profiles', {headers: authHeaders()});
    var d6 = await r6.json();
    var logSel = document.getElementById('fLogProfile');
    logSel.innerHTML = '<option value="">-- none --</option>';
    (d6.profiles || []).forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name + (p.description ? ' — ' + p.description : '');
      logSel.appendChild(opt);
    });
  } catch(e) {}
}

async function loadFrontends() {
  try {
    var r = await fetch('/api/frontends', {headers: authHeaders()});
    var d = await r.json();
    var rows = '';
    (d.frontends || []).forEach(function(f) {
      var listen = (f.listen || []).join(', ');
      var waf = f.waf_enabled ? '<span class="badge badge-green">on</span>' : '<span class="badge badge-gray">off</span>';
      var maxc = f.max_connections || '--';
      rows += '<tr>';
      rows += '<td><strong>'+esc(f.name)+'</strong></td>';
      rows += '<td>'+esc(f.protocol)+'</td>';
      rows += '<td style="font-size:.82rem">'+esc(listen)+'</td>';
      rows += '<td>'+esc(f.backend_pool)+'</td>';
      rows += '<td>'+waf+'</td>';
      rows += '<td>'+maxc+'</td>';
      rows += '<td>';
      rows += '<a class="btn btn-secondary btn-sm" href="/ui/frontends-edit.html?name='+encodeURIComponent(f.name)+'">Edit</a> ';
      rows += '<button class="btn btn-danger btn-sm" onclick="deleteFrontend(\''+esc(f.name)+'\')">Delete</button>';
      rows += '</td>';
      rows += '</tr>';
    });
    document.getElementById('feBody').innerHTML = rows || '<tr><td colspan="7" class="empty-state">No frontends configured</td></tr>';
    checkSmtpFrontends();
  } catch(e) {
    document.getElementById('feBody').innerHTML = '<tr><td colspan="7">Error loading frontends</td></tr>';
  }
}

async function submitFrontend() {
  var name     = document.getElementById('fName').value.trim();
  var protocol = document.getElementById('fProtocol').value;
  var listenRaw= document.getElementById('fListen').value.trim();
  var pool     = document.getElementById('fPool').value.trim();
  var errEl    = document.getElementById('fError');

  if (!name || !listenRaw || !pool) {
    errEl.textContent = 'Name, listen addresses, and backend pool are required.';
    errEl.style.display = '';
    return;
  }

  var listen = listenRaw.split('\n').map(function(s){return s.trim()}).filter(Boolean);

  var body = {
    name: name,
    protocol: protocol,
    listen: listen,
    backend_pool: pool,
    balancer: document.getElementById('fBalancer').value,
    waf_enabled: document.getElementById('fWaf').checked,
    headers: {
      x_forwarded_for: document.getElementById('fXFF').checked,
      x_real_ip:       document.getElementById('fXRI').checked,
      x_forwarded_proto: document.getElementById('fXFP').checked,
    },
    acl: { default_action: document.getElementById('fAclDefault').value },
  };

  var stickyCookie = document.getElementById('fStickyCookie').value.trim();
  if (stickyCookie && body.balancer === 'sticky_session') body.session_cookie = stickyCookie;

  var wafRuleset = document.getElementById('fWafRuleset').value.trim();
  if (wafRuleset) body.waf_ruleset = wafRuleset;

  var secProfile = document.getElementById('fSecurityProfile').value.trim();
  if (secProfile) body.security_profile = secProfile;

  var tlsProfile = document.getElementById('fTlsProfile').value.trim();
  if (tlsProfile) body.tls_profile = tlsProfile;

  var logProfile = document.getElementById('fLogProfile').value.trim();
  if (logProfile) body.log_profile = logProfile;

  var maxConn = parseInt(document.getElementById('fMaxConn').value);
  if (maxConn > 0) body.max_connections = maxConn;

  var certVal = document.getElementById('fTlsCert').value.trim();
  if (certVal) body.tls_cert = certVal;

  var keyVal = document.getElementById('fTlsKey').value.trim();
  if (keyVal) body.tls_key = keyVal;

  var logFile = document.getElementById('fLogFile').value.trim();
  if (logFile) body.log_file = logFile;

  try {
    var r = await fetch('/api/frontends', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(body),
    });
    var res = await r.json();
    if (!r.ok) {
      errEl.textContent = res.error || 'Create failed';
      errEl.style.display = '';
      return;
    }
    hideAddForm();
    loadFrontends();
  } catch(e) {
    errEl.textContent = 'Request failed: ' + e.message;
    errEl.style.display = '';
  }
}

async function deleteFrontend(name) {
  if (!confirm('Delete frontend "' + name + '"?')) return;
  try {
    var r = await fetch('/api/frontends/' + encodeURIComponent(name), {
      method: 'DELETE',
      headers: authHeaders(),
    });
    if (!r.ok) { var d = await r.json(); alert(d.error || 'Delete failed'); return; }
    loadFrontends();
  } catch(e) { alert('Request failed'); }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

initPage('frontends');
loadFrontends();
</script>
{% endblock %}
