{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
    <h2>Dashboard</h2>
    <div class="cards" id="statusCards">
      <div class="card"><h3>Status</h3><div class="value" id="sysStatus">--</div></div>
      <div class="card"><h3>Uptime</h3><div class="value" id="uptime">--</div></div>
      <div class="card"><h3>Frontends</h3><div class="value" id="feCount">--</div></div>
      <div class="card"><h3>Backend Pools</h3><div class="value" id="beCount">--</div></div>
      <div class="card"><h3>Active Connections</h3><div class="value" id="connCount">--</div></div>
      <div class="card" id="cardQueue" style="display:none"><h3>Mail Queue</h3><div class="value" id="queueSize">--</div></div>
    </div>
{% endblock %}
{% block scripts %}
<script>
async function loadDashboard() {
  try {
    var st = await fetch('/api/status', {headers: authHeaders()}).then(function(r){return r.json()});
    document.getElementById('sysStatus').textContent  = st.status || 'ok';
    document.getElementById('uptime').textContent     = fmtUptime(st.uptime_seconds);
    document.getElementById('feCount').textContent    = st.frontend_count || 0;
    document.getElementById('beCount').textContent    = st.backend_pool_count || 0;
    document.getElementById('connCount').textContent  = st.active_connections || 0;
    document.getElementById('queueSize').textContent  = st.queue_total || 0;
  } catch(e) {
    console.error('Dashboard load error', e);
  }
}

initPage('dashboard');
loadDashboard();
setInterval(loadDashboard, 15000);
</script>
{% endblock %}
