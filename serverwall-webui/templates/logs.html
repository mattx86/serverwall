{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block head_extra %}
<style>
#logOutput{
  background:#0d0d0d;
  color:#c8c8c8;
  font-family:'Courier New',Courier,monospace;
  font-size:.78rem;
  line-height:1.55;
  padding:.8rem 1rem;
  border-radius:6px;
  border:1px solid var(--border);
  height:520px;
  overflow-y:auto;
  white-space:pre-wrap;
  word-break:break-all;
}
#logOutput .line-err{color:#f38ba8}
#logOutput .line-warn{color:#f9e2af}
#logOutput .line-info{color:#a6e3a1}
.log-toolbar{display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem;flex-wrap:wrap}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem}
.status-dot.connected{background:#a6e3a1}
.status-dot.disconnected{background:#f38ba8}
.status-dot.idle{background:#6c7086}
</style>
{% endblock %}
{% block content %}
    <div class="toolbar">
      <h2 style="margin:0;flex:1">Logs</h2>
    </div>

    <div class="form-panel">
      <div class="log-toolbar">
        <div class="form-group" style="margin:0;display:flex;align-items:center;gap:.5rem">
          <label style="white-space:nowrap;font-size:.85rem;color:var(--muted)">Source:</label>
          <select id="frontendSelect" onchange="connectStream()" style="padding:.3rem .6rem;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:.85rem">
            <option value="" data-source="daemon">Daemon / ACME</option>
            <option value="" data-source="webui">Web UI</option>
            <option value="" disabled>────────────</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;font-size:.82rem;color:var(--muted);flex:1">
          <span class="status-dot idle" id="statusDot"></span>
          <span id="statusText">Not connected</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="togglePause()" id="pauseBtn" disabled>Pause</button>
        <button class="btn btn-secondary btn-sm" onclick="clearLog()">Clear</button>
        <button class="btn btn-secondary btn-sm" onclick="downloadLog()">Download</button>
      </div>
      <div id="logOutput"><span style="color:#6c7086">Select a source above to start streaming logs.</span></div>
    </div>
{% endblock %}
{% block scripts %}
<script>
var evtSource = null;
var paused = false;
var logLines = [];
var MAX_LINES = 2000;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function loadFrontends() {
  try {
    var r = await fetch('/api/frontends', {headers: authHeaders()});
    var d = await r.json();
    var sel = document.getElementById('frontendSelect');
    // Remove only the separator and any previously-added frontend options
    while (sel.options.length > 3) sel.remove(3);
    (d.frontends || []).forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = f.name + ' (' + esc(f.protocol) + ')';
      sel.appendChild(opt);
    });
  } catch(e) {}
  // Auto-select Daemon / ACME
  document.getElementById('frontendSelect').selectedIndex = 0;
  connectStream();
}

function connectStream() {
  var sel = document.getElementById('frontendSelect');
  var opt = sel.options[sel.selectedIndex];
  var src = opt ? opt.getAttribute('data-source') : null;
  var name = sel.value;

  if (evtSource) {
    evtSource.close();
    evtSource = null;
  }
  if (!src && !name) {
    setStatus('idle', 'Not connected');
    document.getElementById('pauseBtn').disabled = true;
    return;
  }

  var url = src
    ? '/api/logs?source=' + encodeURIComponent(src)
    : '/api/logs?frontend=' + encodeURIComponent(name);
  var label = src ? (opt.textContent || src) : name;

  evtSource = new EventSource(url);

  evtSource.onopen = function() {
    setStatus('connected', 'Connected to ' + label);
    document.getElementById('pauseBtn').disabled = false;
  };

  evtSource.onmessage = function(e) {
    if (paused) return;
    appendLine(e.data);
  };

  evtSource.onerror = function() {
    setStatus('disconnected', 'Disconnected — reconnecting...');
  };
}

function appendLine(text) {
  var cls = '';
  var lower = text.toLowerCase();
  if (lower.indexOf('"error"') !== -1 || lower.indexOf(' error ') !== -1) cls = 'line-err';
  else if (lower.indexOf(' warn ') !== -1)  cls = 'line-warn';
  else if (lower.indexOf(' info ') !== -1)  cls = 'line-info';

  logLines.push({text: text, cls: cls});
  if (logLines.length > MAX_LINES) logLines.shift();

  var out = document.getElementById('logOutput');
  var span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  out.appendChild(span);

  // Auto-scroll to bottom
  out.scrollTop = out.scrollHeight;

  // Trim DOM lines to MAX_LINES
  while (out.childNodes.length > MAX_LINES) {
    out.removeChild(out.firstChild);
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
  if (!paused) {
    var out = document.getElementById('logOutput');
    out.scrollTop = out.scrollHeight;
  }
}

function clearLog() {
  logLines = [];
  document.getElementById('logOutput').innerHTML = '';
}

function downloadLog() {
  var content = logLines.map(function(l){ return l.text; }).join('\n');
  var blob = new Blob([content], {type: 'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var sel = document.getElementById('frontendSelect');
  var opt = sel.options[sel.selectedIndex];
  var src = opt ? opt.getAttribute('data-source') : null;
  var label = src ? src : (sel.value || 'log');
  a.download = 'serverwall-' + label + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function setStatus(state, text) {
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = text;
}

initPage('logs');
loadFrontends();
</script>
{% endblock %}
