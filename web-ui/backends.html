<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServerWall - Backends</title>
<link rel="stylesheet" href="/ui/app.css">
<style>
.pool-header{background:var(--surface2);padding:.5rem .8rem;display:flex;align-items:center;gap:.7rem;border-radius:4px 4px 0 0;border:1px solid var(--border)}
.pool-header strong{flex:1;font-size:.95rem}
.pool-block{margin-bottom:1.2rem}
.pool-block table{border-radius:0 0 6px 6px;margin-bottom:0}
</style>
</head>
<body>
<div id="topbar">
  <span class="brand">ServerWall</span>
  <button id="logoutBtn">Logout</button>
</div>
<div id="layout">
  <div id="sidebar"></div>
  <div id="main">
    <div class="toolbar">
      <h2 style="margin:0;flex:1">Backend Pools</h2>
      <button class="btn btn-primary" onclick="showPoolForm()">+ Add Pool</button>
    </div>

    <!-- Add Pool Form -->
    <div id="addPoolForm" class="form-panel" style="display:none">
      <h3>Add Backend Pool</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Pool Name *</label>
          <input type="text" id="pName" placeholder="e.g. web-pool">
        </div>
        <div class="form-group">
          <label>Health Check Type</label>
          <select id="pHcType">
            <option value="tcp">TCP</option>
            <option value="http">HTTP</option>
            <option value="smtp">SMTP</option>
            <option value="imap">IMAP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Health Check Interval</label>
          <input type="text" id="pHcInterval" value="10s" placeholder="10s">
        </div>
        <div class="form-group">
          <label>Health Check Timeout</label>
          <input type="text" id="pHcTimeout" value="3s" placeholder="3s">
        </div>
        <div class="form-group">
          <label>Health Check Path (HTTP)</label>
          <input type="text" id="pHcPath" placeholder="/health">
        </div>
        <div class="form-group">
          <label>Expected HTTP Status</label>
          <input type="number" id="pHcExpect" value="200" min="100" max="599">
        </div>
      </div>
      <div style="margin-top:.8rem">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.5rem">Initial Backend (optional)</label>
        <div class="form-grid">
          <div class="form-group">
            <label>Address</label>
            <input type="text" id="b0Addr" placeholder="127.0.0.1:8080">
          </div>
          <div class="form-group">
            <label>Weight</label>
            <input type="number" id="b0Weight" value="1" min="1">
          </div>
          <div class="form-group" style="justify-content:flex-end">
            <label class="form-check" style="margin-top:1.4rem"><input type="checkbox" id="b0Tls"> TLS</label>
          </div>
        </div>
      </div>
      <div id="pError" class="form-error" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitPool()">Create Pool</button>
        <button class="btn btn-secondary" onclick="hidePoolForm()">Cancel</button>
      </div>
    </div>

    <!-- Add Backend Form (per pool) -->
    <div id="addBackendForm" class="form-panel" style="display:none">
      <h3>Add Backend to pool: <span id="addBackendPoolName"></span></h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Address * (host:port)</label>
          <input type="text" id="bAddr" placeholder="192.168.1.10:8080">
        </div>
        <div class="form-group">
          <label>Name (optional, defaults to address)</label>
          <input type="text" id="bName" placeholder="">
        </div>
        <div class="form-group">
          <label>Weight</label>
          <input type="number" id="bWeight" value="1" min="1">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label class="form-check" style="margin-top:1.4rem"><input type="checkbox" id="bTls"> Backend TLS</label>
        </div>
      </div>
      <div id="bError" class="form-error" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitBackend()">Add Backend</button>
        <button class="btn btn-secondary" onclick="hideBackendForm()">Cancel</button>
      </div>
    </div>

    <div id="poolList"><p style="color:var(--muted)">Loading...</p></div>
  </div>
</div>
<script src="/ui/app.js"></script>
<script>
var editingPoolName = null;

function showPoolForm(){document.getElementById('addPoolForm').style.display='';document.getElementById('pError').style.display='none'}
function hidePoolForm(){document.getElementById('addPoolForm').style.display='none'}
function showBackendForm(poolName){
  editingPoolName = poolName;
  document.getElementById('addBackendPoolName').textContent = poolName;
  document.getElementById('bAddr').value='';
  document.getElementById('bName').value='';
  document.getElementById('bWeight').value='1';
  document.getElementById('bTls').checked=false;
  document.getElementById('bError').style.display='none';
  document.getElementById('addBackendForm').style.display='';
  document.getElementById('addBackendForm').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function hideBackendForm(){document.getElementById('addBackendForm').style.display='none';editingPoolName=null}

async function loadPools() {
  try {
    var r = await fetch('/api/backends', {headers: authHeaders()});
    var d = await r.json();
    var pools = d.pools || [];
    var html = '';
    if (!pools.length) {
      html = '<p style="color:var(--muted)">No backend pools configured</p>';
    } else {
      pools.forEach(function(p) {
        html += '<div class="pool-block">';
        html += '<div class="pool-header">';
        html += '<strong>'+esc(p.name)+'</strong>';
        html += '<span style="font-size:.8rem;color:var(--muted)">'+esc(p.health_check_type)+'&nbsp;&bull;&nbsp;'+esc(p.health_check_interval||'')+'</span>';
        html += '<button class="btn btn-secondary btn-sm" onclick="showBackendForm(\''+esc(p.name)+'\')">+ Backend</button>';
        html += '<button class="btn btn-danger btn-sm" onclick="deletePool(\''+esc(p.name)+'\')">Delete Pool</button>';
        html += '</div>';
        html += '<table><thead><tr><th>Name</th><th>Address</th><th>Weight</th><th>TLS</th><th>Enabled</th></tr></thead><tbody>';
        var backends = p.backends || [];
        if (!backends.length) {
          html += '<tr><td colspan="5" style="color:var(--muted)">No backends in this pool</td></tr>';
        } else {
          backends.forEach(function(b) {
            var tls  = b.tls     ? '<span class="badge badge-green">yes</span>' : '<span class="badge badge-gray">no</span>';
            var enbl = b.enabled !== false ? '<span class="badge badge-green">yes</span>' : '<span class="badge badge-red">no</span>';
            html += '<tr><td>'+esc(b.name)+'</td><td>'+esc(b.address)+'</td><td>'+esc(b.weight||1)+'</td><td>'+tls+'</td><td>'+enbl+'</td></tr>';
          });
        }
        html += '</tbody></table></div>';
      });
    }
    document.getElementById('poolList').innerHTML = html;
  } catch(e) {
    document.getElementById('poolList').innerHTML = '<p style="color:var(--danger)">Error loading backends</p>';
  }
}

async function submitPool() {
  var name = document.getElementById('pName').value.trim();
  var errEl = document.getElementById('pError');
  if (!name) { errEl.textContent='Pool name is required.'; errEl.style.display=''; return; }

  var body = {
    name: name,
    health_check_type: document.getElementById('pHcType').value,
    health_check_interval: document.getElementById('pHcInterval').value.trim() || '10s',
    health_check_timeout:  document.getElementById('pHcTimeout').value.trim()  || '3s',
    health_check_expect: parseInt(document.getElementById('pHcExpect').value) || 200,
    backend: [],
  };

  var hcPath = document.getElementById('pHcPath').value.trim();
  if (hcPath) body.health_check_path = hcPath;

  var initAddr = document.getElementById('b0Addr').value.trim();
  if (initAddr) {
    body.backend.push({
      name: initAddr,
      address: initAddr,
      weight: parseInt(document.getElementById('b0Weight').value) || 1,
      tls: document.getElementById('b0Tls').checked,
      enabled: true,
    });
  }

  try {
    var r = await fetch('/api/backends', {method:'POST', headers:authHeaders(), body:JSON.stringify(body)});
    var res = await r.json();
    if (!r.ok) { errEl.textContent = res.error||'Create failed'; errEl.style.display=''; return; }
    hidePoolForm();
    loadPools();
  } catch(e) { errEl.textContent='Request failed: '+e.message; errEl.style.display=''; }
}

async function submitBackend() {
  var addr  = document.getElementById('bAddr').value.trim();
  var errEl = document.getElementById('bError');
  if (!addr || !editingPoolName) { errEl.textContent='Address is required.'; errEl.style.display=''; return; }

  // To add a backend we must fetch the pool, append, then re-POST... but the API only
  // supports DELETE/POST on the whole pool. So we fetch the current pool, append, recreate.
  try {
    var r = await fetch('/api/backends/'+encodeURIComponent(editingPoolName), {headers:authHeaders()});
    if (!r.ok) { errEl.textContent='Could not load pool'; errEl.style.display=''; return; }
    var d  = await r.json();
    var pool = d.pool;

    var bname = document.getElementById('bName').value.trim() || addr;
    pool.backend = pool.backends || [];
    pool.backend.push({
      name: bname,
      address: addr,
      weight: parseInt(document.getElementById('bWeight').value) || 1,
      tls: document.getElementById('bTls').checked,
      enabled: true,
    });
    // Remove the backends key (use backend)
    delete pool.backends;

    // Delete old, re-create
    await fetch('/api/backends/'+encodeURIComponent(editingPoolName), {method:'DELETE', headers:authHeaders()});
    var r2 = await fetch('/api/backends', {method:'POST', headers:authHeaders(), body:JSON.stringify(pool)});
    var res = await r2.json();
    if (!r2.ok) { errEl.textContent = res.error||'Create failed'; errEl.style.display=''; return; }
    hideBackendForm();
    loadPools();
  } catch(e) { errEl.textContent='Request failed: '+e.message; errEl.style.display=''; }
}

async function deletePool(name) {
  if (!confirm('Delete backend pool "'+name+'"?\nAll frontends using this pool will lose their backend.')) return;
  try {
    var r = await fetch('/api/backends/'+encodeURIComponent(name), {method:'DELETE', headers:authHeaders()});
    if (!r.ok) { var d=await r.json(); alert(d.error||'Delete failed'); return; }
    loadPools();
  } catch(e) { alert('Request failed'); }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

initPage('backends');
loadPools();
</script>
</body>
</html>
