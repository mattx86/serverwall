<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServerWall - Backends</title>
<link rel="stylesheet" href="/ui/app.css">
<style>
.pool-header{background:var(--surface2);padding:.5rem .8rem;display:flex;align-items:center;gap:.7rem;border-radius:4px 4px 0 0;border:1px solid var(--border)}
.pool-header strong{flex:1;font-size:.95rem}
.pool-block{margin-bottom:1.2rem}
.pool-block table{border-radius:0 0 6px 6px;margin-bottom:0}
.member-row{display:grid;grid-template-columns:2fr 1.5fr 0.7fr auto auto auto auto;gap:.5rem;align-items:center;margin-bottom:.4rem}
.member-row input,.member-row select{padding:.35rem .5rem;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:.85rem}
.member-row label{font-size:.82rem;color:var(--muted)}
</style>
</head>
<body>
<div id="topbar">
  <span class="brand">ServerWall</span>
  <button id="logoutBtn">Logout</button>
</div>
<div id="layout">
  <div id="sidebar"></div>
  <div id="main">
    <div class="toolbar" id="poolToolbar">
      <h2 style="margin:0;flex:1">Backend Pools</h2>
      <button class="btn btn-primary" id="addPoolBtn" onclick="showPoolForm()">+ Add Pool</button>
    </div>

    <!-- Add Pool Form -->
    <div id="addPoolForm" class="form-panel" style="display:none">
      <h3>Add Backend Pool</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Pool Name *</label>
          <input type="text" id="pName" placeholder="e.g. web-pool">
        </div>
        <div class="form-group">
          <label>Health Check Type</label>
          <select id="pHcType">
            <option value="tcp">TCP</option>
            <option value="http">HTTP</option>
            <option value="smtp">SMTP</option>
            <option value="imap">IMAP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Health Check Interval</label>
          <input type="text" id="pHcInterval" value="10s" placeholder="10s">
        </div>
        <div class="form-group">
          <label>Health Check Timeout</label>
          <input type="text" id="pHcTimeout" value="3s" placeholder="3s">
        </div>
        <div class="form-group">
          <label>Health Check Path (HTTP)</label>
          <input type="text" id="pHcPath" placeholder="/health">
        </div>
        <div class="form-group">
          <label>Expected HTTP Status</label>
          <input type="number" id="pHcExpect" value="200" min="100" max="599">
        </div>
      </div>
      <div style="margin-top:.8rem;display:flex;gap:1.2rem;flex-wrap:wrap">
        <label class="form-check"><input type="checkbox" id="pHcTls"> HC TLS</label>
        <label class="form-check"><input type="checkbox" id="pHcIgnoreCert"> HC Ignore Cert</label>
      </div>

      <div style="margin-top:1rem">
        <div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem">
          <span style="font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em">Pool Members</span>
          <button type="button" class="btn btn-secondary btn-sm" onclick="addMemberRow()">+ Add Member</button>
        </div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:.4rem;display:grid;grid-template-columns:2fr 1.5fr 0.7fr auto auto auto auto;gap:.5rem">
          <span>Address *</span><span>Name</span><span>Weight</span><span>TLS</span><span>Enabled</span><span></span>
        </div>
        <div id="memberRows"></div>
      </div>

      <div id="pError" class="form-error" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitPool()">Create Pool</button>
        <button class="btn btn-secondary" onclick="hidePoolForm()">Cancel</button>
      </div>
    </div>

    <table id="poolTable">
      <thead>
        <tr><th>Name</th><th>Health Check</th><th>Interval</th><th>Backends</th><th>Actions</th></tr>
      </thead>
      <tbody id="poolBody">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script src="/ui/app.js"></script>
<script>
var memberCount = 0;

function showPoolForm() {
  document.getElementById('addPoolForm').style.display = '';
  document.getElementById('poolTable').style.display = 'none';
  document.getElementById('addPoolBtn').style.display = 'none';
  document.getElementById('pError').style.display = 'none';
  memberCount = 0;
  document.getElementById('memberRows').innerHTML = '';
  addMemberRow();
}
function hidePoolForm() {
  document.getElementById('addPoolForm').style.display = 'none';
  document.getElementById('poolTable').style.display = '';
  document.getElementById('addPoolBtn').style.display = '';
}

function addMemberRow() {
  var i = memberCount++;
  var row = document.createElement('div');
  row.className = 'member-row';
  row.id = 'member-' + i;
  row.innerHTML =
    '<input type="text" id="mAddr'+i+'" placeholder="host:port">' +
    '<input type="text" id="mName'+i+'" placeholder="(optional)">' +
    '<input type="number" id="mWeight'+i+'" value="1" min="1">' +
    '<label class="form-check" style="white-space:nowrap"><input type="checkbox" id="mTls'+i+'"> TLS</label>' +
    '<label class="form-check" style="white-space:nowrap"><input type="checkbox" id="mEnabled'+i+'" checked> On</label>' +
    '<button type="button" class="btn btn-danger btn-sm" onclick="removeMemberRow('+i+')" style="padding:.2rem .45rem">✕</button>';
  document.getElementById('memberRows').appendChild(row);
}

function removeMemberRow(i) {
  var el = document.getElementById('member-' + i);
  if (el) el.remove();
}


async function loadPools() {
  try {
    var r = await fetch('/api/backends', {headers: authHeaders()});
    var d = await r.json();
    var pools = d.pools || [];
    var rows = '';
    if (!pools.length) {
      rows = '<tr><td colspan="5" class="empty-state">No backend pools configured</td></tr>';
    } else {
      pools.forEach(function(p) {
        var count = (p.backends || []).length;
        rows += '<tr>';
        rows += '<td><strong>'+esc(p.name)+'</strong></td>';
        rows += '<td>'+esc(p.health_check_type)+'</td>';
        rows += '<td>'+esc(p.health_check_interval||'10s')+'</td>';
        rows += '<td>'+count+'</td>';
        rows += '<td>';
        rows += '<a class="btn btn-secondary btn-sm" href="/ui/backends-edit.html?pool='+encodeURIComponent(p.name)+'">Edit</a> ';
        rows += '<button class="btn btn-danger btn-sm" onclick="deletePool(\''+esc(p.name)+'\')">Delete</button>';
        rows += '</td>';
        rows += '</tr>';
      });
    }
    document.getElementById('poolBody').innerHTML = rows;
  } catch(e) {
    document.getElementById('poolBody').innerHTML = '<tr><td colspan="5" style="color:var(--danger)">Error loading backends</td></tr>';
  }
}

async function submitPool() {
  var name = document.getElementById('pName').value.trim();
  var errEl = document.getElementById('pError');
  if (!name) { errEl.textContent = 'Pool name is required.'; errEl.style.display = ''; return; }

  var body = {
    name: name,
    health_check_type: document.getElementById('pHcType').value,
    health_check_interval: document.getElementById('pHcInterval').value.trim() || '10s',
    health_check_timeout:  document.getElementById('pHcTimeout').value.trim()  || '3s',
    health_check_expect: parseInt(document.getElementById('pHcExpect').value) || 200,
    health_check_tls: document.getElementById('pHcTls').checked,
    health_check_ignore_cert: document.getElementById('pHcIgnoreCert').checked,
    backend: [],
  };

  var hcPath = document.getElementById('pHcPath').value.trim();
  if (hcPath) body.health_check_path = hcPath;

  // Collect member rows
  document.querySelectorAll('[id^="member-"]').forEach(function(row) {
    var i = row.id.replace('member-', '');
    var addrEl = document.getElementById('mAddr' + i);
    if (!addrEl) return;
    var addr = addrEl.value.trim();
    if (!addr) return;
    body.backend.push({
      name: document.getElementById('mName' + i).value.trim() || addr,
      address: addr,
      weight: parseInt(document.getElementById('mWeight' + i).value) || 1,
      tls: document.getElementById('mTls' + i).checked,
      enabled: document.getElementById('mEnabled' + i).checked,
    });
  });

  try {
    var r = await fetch('/api/backends', {method: 'POST', headers: authHeaders(), body: JSON.stringify(body)});
    var res = await r.json();
    if (!r.ok) { errEl.textContent = res.error || 'Create failed'; errEl.style.display = ''; return; }
    hidePoolForm();
    loadPools();
  } catch(e) { errEl.textContent = 'Request failed: ' + e.message; errEl.style.display = ''; }
}


async function deletePool(name) {
  if (!confirm('Delete backend pool "' + name + '"?\nAll frontends using this pool will lose their backend.')) return;
  try {
    var r = await fetch('/api/backends/' + encodeURIComponent(name), {method: 'DELETE', headers: authHeaders()});
    if (!r.ok) { var d = await r.json(); alert(d.error || 'Delete failed'); return; }
    loadPools();
  } catch(e) { alert('Request failed'); }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

initPage('backends');
loadPools();
</script>
</body>
</html>
