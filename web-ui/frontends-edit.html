<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServerWall - Edit Frontend</title>
<link rel="stylesheet" href="/ui/app.css">
</head>
<body>
<div id="topbar">
  <span class="brand">ServerWall</span>
  <button id="logoutBtn">Logout</button>
</div>
<div id="layout">
  <div id="sidebar"></div>
  <div id="main">
    <div class="toolbar" style="margin-bottom:1rem">
      <h2 style="margin:0;flex:1">Edit Frontend: <span id="feTitle" style="color:var(--muted);font-weight:400"></span></h2>
      <a href="/ui/frontends.html" class="btn btn-secondary btn-sm">&#8592; Back</a>
    </div>

    <div id="loadError" class="form-error" style="display:none"></div>

    <div id="editPanel" class="form-panel" style="display:none">
      <div class="form-grid">
        <div class="form-group">
          <label>Protocol *</label>
          <select id="fProtocol">
            <option value="https">HTTPS</option>
            <option value="smtps">SMTPS</option>
            <option value="smtpstarttls">SMTP+STARTTLS</option>
            <option value="imaps">IMAPS</option>
            <option value="tcp">TCP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Listen Addresses * (one per line)</label>
          <textarea id="fListen" placeholder="0.0.0.0:443"></textarea>
        </div>
        <div class="form-group">
          <label>Backend Pool *</label>
          <select id="fPool"><option value="">-- select pool --</option></select>
        </div>
        <div class="form-group">
          <label>Balancer</label>
          <select id="fBalancer" onchange="toggleStickyField()">
            <option value="round_robin">Round Robin</option>
            <option value="least_connections">Least Connections</option>
            <option value="ip_hash">IP Hash</option>
            <option value="sticky_session">Sticky Session</option>
          </select>
        </div>
        <div class="form-group" id="fStickyGroup" style="display:none">
          <label>Session Cookie Name</label>
          <input type="text" id="fStickyCookie" placeholder="SWSESSION">
        </div>
        <div class="form-group">
          <label>TLS Certificate</label>
          <select id="fTlsCertSelect" onchange="syncCertFields()">
            <option value="">-- none --</option>
          </select>
          <input type="hidden" id="fTlsCert">
          <input type="hidden" id="fTlsKey">
        </div>
        <div class="form-group">
          <label>WAF Ruleset</label>
          <select id="fWafRuleset"><option value="">-- none --</option></select>
        </div>
        <div class="form-group">
          <label>Max Connections (blank = unlimited)</label>
          <input type="number" id="fMaxConn" min="1" placeholder="">
        </div>
        <div class="form-group">
          <label>ACL Default Action</label>
          <select id="fAclDefault">
            <option value="allow">Allow</option>
            <option value="deny">Deny</option>
          </select>
        </div>
        <div class="form-group">
          <label>Log File</label>
          <input type="text" id="fLogFile" placeholder="/opt/serverwall/var/log/web.log">
        </div>
      </div>
      <div style="margin-top:.8rem">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem">HTTP Headers</label>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <label class="form-check"><input type="checkbox" id="fXFF"> X-Forwarded-For</label>
          <label class="form-check"><input type="checkbox" id="fXRI"> X-Real-IP</label>
          <label class="form-check"><input type="checkbox" id="fXFP"> X-Forwarded-Proto</label>
          <label class="form-check"><input type="checkbox" id="fWaf"> WAF Enabled</label>
        </div>
      </div>
      <div id="saveError" class="form-error" style="display:none;margin-top:.8rem"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveFrontend()">Save Changes</button>
        <a href="/ui/frontends.html" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </div>
</div>
<script src="/ui/app.js"></script>
<script>
var feName = '';
var _certMap = {};

function getFeName() {
  return new URLSearchParams(window.location.search).get('name') || '';
}

function toggleStickyField() {
  var isSticky = document.getElementById('fBalancer').value === 'sticky_session';
  document.getElementById('fStickyGroup').style.display = isSticky ? '' : 'none';
}

function syncCertFields() {
  var sel = document.getElementById('fTlsCertSelect').value;
  if (sel && _certMap[sel]) {
    document.getElementById('fTlsCert').value = _certMap[sel].cert;
    document.getElementById('fTlsKey').value  = _certMap[sel].key;
  } else {
    document.getElementById('fTlsCert').value = '';
    document.getElementById('fTlsKey').value  = '';
  }
}

async function loadDropdowns(currentPool, currentWaf, currentCert) {
  // Pools
  try {
    var r = await fetch('/api/backends', {headers: authHeaders()});
    var d = await r.json();
    var poolSel = document.getElementById('fPool');
    poolSel.innerHTML = '<option value="">-- select pool --</option>';
    (d.pools || []).forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p.name; opt.textContent = p.name;
      if (p.name === currentPool) opt.selected = true;
      poolSel.appendChild(opt);
    });
  } catch(e) {}

  // WAF rulesets
  try {
    var r2 = await fetch('/api/waf', {headers: authHeaders()});
    var d2 = await r2.json();
    var wafSel = document.getElementById('fWafRuleset');
    wafSel.innerHTML = '<option value="">-- none --</option>';
    (d2.waf_rules || []).forEach(function(w) {
      var opt = document.createElement('option');
      opt.value = w.name; opt.textContent = w.name;
      if (w.name === currentWaf) opt.selected = true;
      wafSel.appendChild(opt);
    });
  } catch(e) {}

  // Certificates
  try {
    var r3 = await fetch('/api/certs', {headers: authHeaders()});
    var d3 = await r3.json();
    var certSel = document.getElementById('fTlsCertSelect');
    certSel.innerHTML = '<option value="">-- none --</option>';
    _certMap = {};
    var certsDir = '/opt/serverwall/etc/certs/';
    (d3.certificates || []).forEach(function(c) {
      if (!c.key_exists) return;
      var opt = document.createElement('option');
      opt.value = c.name; opt.textContent = c.name + (c.expiry ? '  (exp: '+c.expiry+')' : '');
      // Match by cert_file path if current cert path ends with cert name
      if (currentCert && currentCert.indexOf(c.name) !== -1) opt.selected = true;
      certSel.appendChild(opt);
      _certMap[c.name] = {
        cert: certsDir + c.cert_file,
        key:  certsDir + c.key_file,
      };
    });
    syncCertFields();
  } catch(e) {}
}

async function loadFrontend() {
  feName = getFeName();
  if (!feName) {
    document.getElementById('loadError').textContent = 'No frontend name specified.';
    document.getElementById('loadError').style.display = '';
    return;
  }
  document.getElementById('feTitle').textContent = feName;
  document.title = 'ServerWall - Edit Frontend: ' + feName;

  try {
    var r = await fetch('/api/frontends/' + encodeURIComponent(feName), {headers: authHeaders()});
    var d = await r.json();
    if (!r.ok) {
      document.getElementById('loadError').textContent = d.error || 'Failed to load frontend';
      document.getElementById('loadError').style.display = '';
      return;
    }
    var f = d.frontend;

    // Populate form
    setSelect('fProtocol', (f.protocol || 'https').toLowerCase());
    document.getElementById('fListen').value   = (f.listen || []).join('\n');
    document.getElementById('fMaxConn').value  = f.max_connections || '';
    document.getElementById('fLogFile').value  = f.log_file || '';
    document.getElementById('fXFF').checked    = !!(f.headers && f.headers.x_forwarded_for);
    document.getElementById('fXRI').checked    = !!(f.headers && f.headers.x_real_ip);
    document.getElementById('fXFP').checked    = !!(f.headers && f.headers.x_forwarded_proto);
    document.getElementById('fWaf').checked    = !!f.waf_enabled;
    setSelect('fBalancer', (f.balancer || 'round_robin').toLowerCase());
    toggleStickyField();
    if (f.session_cookie) document.getElementById('fStickyCookie').value = f.session_cookie;
    if (f.acl) setSelect('fAclDefault', (f.acl.default_action || 'allow').toLowerCase());

    await loadDropdowns(f.backend_pool, f.waf_ruleset, f.tls_cert);
    document.getElementById('editPanel').style.display = '';
  } catch(e) {
    document.getElementById('loadError').textContent = 'Request failed: ' + e.message;
    document.getElementById('loadError').style.display = '';
  }
}

function setSelect(id, val) {
  var el = document.getElementById(id);
  for (var i = 0; i < el.options.length; i++) {
    if (el.options[i].value === val) { el.selectedIndex = i; return; }
  }
}

async function saveFrontend() {
  var errEl = document.getElementById('saveError');
  errEl.style.display = 'none';

  var listenRaw = document.getElementById('fListen').value.trim();
  var pool      = document.getElementById('fPool').value.trim();
  if (!listenRaw || !pool) {
    errEl.textContent = 'Listen addresses and backend pool are required.';
    errEl.style.display = ''; return;
  }

  var body = {
    name:        feName,
    protocol:    document.getElementById('fProtocol').value,
    listen:      listenRaw.split('\n').map(function(s){return s.trim()}).filter(Boolean),
    backend_pool: pool,
    balancer:    document.getElementById('fBalancer').value,
    waf_enabled: document.getElementById('fWaf').checked,
    headers: {
      x_forwarded_for:   document.getElementById('fXFF').checked,
      x_real_ip:         document.getElementById('fXRI').checked,
      x_forwarded_proto: document.getElementById('fXFP').checked,
    },
    acl: { default_action: document.getElementById('fAclDefault').value },
  };

  var wafRuleset = document.getElementById('fWafRuleset').value.trim();
  if (wafRuleset) body.waf_ruleset = wafRuleset;

  var maxConn = parseInt(document.getElementById('fMaxConn').value);
  if (maxConn > 0) body.max_connections = maxConn;

  var certVal = document.getElementById('fTlsCert').value.trim();
  if (certVal) body.tls_cert = certVal;

  var keyVal = document.getElementById('fTlsKey').value.trim();
  if (keyVal) body.tls_key = keyVal;

  var logFile = document.getElementById('fLogFile').value.trim();
  if (logFile) body.log_file = logFile;

  var stickyCookie = document.getElementById('fStickyCookie').value.trim();
  if (stickyCookie && body.balancer === 'sticky_session') body.session_cookie = stickyCookie;

  try {
    var r = await fetch('/api/frontends/' + encodeURIComponent(feName), {
      method: 'PUT', headers: authHeaders(), body: JSON.stringify(body),
    });
    var res = await r.json();
    if (!r.ok) {
      errEl.textContent = res.error || 'Save failed';
      errEl.style.display = ''; return;
    }
    window.location.href = '/ui/frontends.html';
  } catch(e) {
    errEl.textContent = 'Request failed: ' + e.message;
    errEl.style.display = '';
  }
}

initPage('frontends');
loadFrontend();
</script>
</body>
</html>
