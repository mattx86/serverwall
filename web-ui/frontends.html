<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServerWall - Frontends</title>
<link rel="stylesheet" href="/ui/app.css">
</head>
<body>
<div id="topbar">
  <span class="brand">ServerWall</span>
  <button id="logoutBtn">Logout</button>
</div>
<div id="layout">
  <div id="sidebar"></div>
  <div id="main">
    <div class="toolbar">
      <h2 style="margin:0;flex:1">Frontends</h2>
      <button class="btn btn-primary" onclick="showAddForm()">+ Add Frontend</button>
    </div>

    <div id="addForm" class="form-panel" style="display:none">
      <h3>Add Frontend</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" id="fName" placeholder="e.g. web">
        </div>
        <div class="form-group">
          <label>Protocol *</label>
          <select id="fProtocol">
            <option value="https">HTTPS</option>
            <option value="smtps">SMTPS</option>
            <option value="smtpstarttls">SMTP+STARTTLS</option>
            <option value="imaps">IMAPS</option>
            <option value="tcp">TCP</option>
          </select>
        </div>
        <div class="form-group">
          <label>Listen Addresses * (one per line)</label>
          <textarea id="fListen" placeholder="0.0.0.0:443"></textarea>
        </div>
        <div class="form-group">
          <label>Backend Pool *</label>
          <input type="text" id="fPool" placeholder="e.g. web-pool">
        </div>
        <div class="form-group">
          <label>TLS Cert Path</label>
          <input type="text" id="fTlsCert" placeholder="/opt/serverwall/etc/certs/web.pem">
        </div>
        <div class="form-group">
          <label>TLS Key Path</label>
          <input type="text" id="fTlsKey" placeholder="/opt/serverwall/etc/certs/web-key.pem">
        </div>
        <div class="form-group">
          <label>WAF Ruleset (leave blank to disable)</label>
          <input type="text" id="fWafRuleset" placeholder="default">
        </div>
        <div class="form-group">
          <label>Max Connections (blank = unlimited)</label>
          <input type="number" id="fMaxConn" min="1" placeholder="">
        </div>
        <div class="form-group">
          <label>ACL Default Action</label>
          <select id="fAclDefault">
            <option value="allow">Allow</option>
            <option value="deny">Deny</option>
          </select>
        </div>
        <div class="form-group">
          <label>Log File (blank = none)</label>
          <input type="text" id="fLogFile" placeholder="/opt/serverwall/var/log/web.log">
        </div>
      </div>
      <div style="margin-top:.8rem">
        <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.3rem">HTTP Headers</label>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <label class="form-check"><input type="checkbox" id="fXFF" checked> X-Forwarded-For</label>
          <label class="form-check"><input type="checkbox" id="fXRI" checked> X-Real-IP</label>
          <label class="form-check"><input type="checkbox" id="fXFP" checked> X-Forwarded-Proto</label>
          <label class="form-check"><input type="checkbox" id="fWaf"> WAF Enabled</label>
        </div>
      </div>
      <div id="fError" class="form-error" style="display:none"></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitFrontend()">Create Frontend</button>
        <button class="btn btn-secondary" onclick="hideAddForm()">Cancel</button>
      </div>
    </div>

    <table id="feTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Protocol</th>
          <th>Listen</th>
          <th>Backend Pool</th>
          <th>WAF</th>
          <th>Max Conn</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="feBody">
        <tr><td colspan="7">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script src="/ui/app.js"></script>
<script>
function showAddForm(){document.getElementById('addForm').style.display='';document.getElementById('fError').style.display='none'}
function hideAddForm(){document.getElementById('addForm').style.display='none'}

async function loadFrontends() {
  try {
    var r = await fetch('/api/frontends', {headers: authHeaders()});
    var d = await r.json();
    var rows = '';
    (d.frontends || []).forEach(function(f) {
      var listen = (f.listen || []).join(', ');
      var waf = f.waf_enabled ? '<span class="badge badge-green">on</span>' : '<span class="badge badge-gray">off</span>';
      var maxc = f.max_connections || '--';
      rows += '<tr>';
      rows += '<td><strong>'+esc(f.name)+'</strong></td>';
      rows += '<td>'+esc(f.protocol)+'</td>';
      rows += '<td style="font-size:.82rem">'+esc(listen)+'</td>';
      rows += '<td>'+esc(f.backend_pool)+'</td>';
      rows += '<td>'+waf+'</td>';
      rows += '<td>'+maxc+'</td>';
      rows += '<td><button class="btn btn-danger btn-sm" onclick="deleteFrontend(\''+esc(f.name)+'\')">Delete</button></td>';
      rows += '</tr>';
    });
    document.getElementById('feBody').innerHTML = rows || '<tr><td colspan="7">No frontends configured</td></tr>';
    // re-check SMTP after load (in case list changed)
    checkSmtpFrontends();
  } catch(e) {
    document.getElementById('feBody').innerHTML = '<tr><td colspan="7">Error loading frontends</td></tr>';
  }
}

async function submitFrontend() {
  var name     = document.getElementById('fName').value.trim();
  var protocol = document.getElementById('fProtocol').value;
  var listenRaw= document.getElementById('fListen').value.trim();
  var pool     = document.getElementById('fPool').value.trim();
  var errEl    = document.getElementById('fError');

  if (!name || !listenRaw || !pool) {
    errEl.textContent = 'Name, listen addresses, and backend pool are required.';
    errEl.style.display = '';
    return;
  }

  var listen = listenRaw.split('\n').map(function(s){return s.trim()}).filter(Boolean);

  var body = {
    name: name,
    protocol: protocol,
    listen: listen,
    backend_pool: pool,
    waf_enabled: document.getElementById('fWaf').checked,
    headers: {
      x_forwarded_for: document.getElementById('fXFF').checked,
      x_real_ip:       document.getElementById('fXRI').checked,
      x_forwarded_proto: document.getElementById('fXFP').checked,
    },
    acl: { default_action: document.getElementById('fAclDefault').value },
  };

  var wafRuleset = document.getElementById('fWafRuleset').value.trim();
  if (wafRuleset) body.waf_ruleset = wafRuleset;

  var maxConn = parseInt(document.getElementById('fMaxConn').value);
  if (maxConn > 0) body.max_connections = maxConn;

  var certVal = document.getElementById('fTlsCert').value.trim();
  if (certVal) body.tls_cert = certVal;

  var keyVal = document.getElementById('fTlsKey').value.trim();
  if (keyVal) body.tls_key = keyVal;

  var logFile = document.getElementById('fLogFile').value.trim();
  if (logFile) body.log_file = logFile;

  try {
    var r = await fetch('/api/frontends', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(body),
    });
    var res = await r.json();
    if (!r.ok) {
      errEl.textContent = res.error || 'Create failed';
      errEl.style.display = '';
      return;
    }
    hideAddForm();
    loadFrontends();
  } catch(e) {
    errEl.textContent = 'Request failed: ' + e.message;
    errEl.style.display = '';
  }
}

async function deleteFrontend(name) {
  if (!confirm('Delete frontend "' + name + '"?')) return;
  try {
    var r = await fetch('/api/frontends/' + encodeURIComponent(name), {
      method: 'DELETE',
      headers: authHeaders(),
    });
    if (!r.ok) { var d = await r.json(); alert(d.error || 'Delete failed'); return; }
    loadFrontends();
  } catch(e) { alert('Request failed'); }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

initPage('frontends');
loadFrontends();
</script>
</body>
</html>
