<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ServerWall - Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#16213e;border-radius:8px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
h1{text-align:center;margin-bottom:1.5rem;color:#0f9;font-size:1.5rem}
label{display:block;margin-bottom:.4rem;font-size:.85rem;color:#aaa}
input{width:100%;padding:.65rem;border:1px solid #333;border-radius:4px;background:#0f3460;color:#e0e0e0;font-size:.95rem;margin-bottom:1rem}
input:focus{outline:none;border-color:#0f9}
button{width:100%;padding:.7rem;background:#0f9;color:#1a1a2e;border:none;border-radius:4px;font-size:1rem;font-weight:600;cursor:pointer}
button:hover{background:#0d8}
.error{color:#f66;font-size:.85rem;margin-bottom:1rem;display:none}
</style>
</head>
<body>
<div class="login-box">
  <h1>ServerWall</h1>
  <div id="error" class="error"></div>
  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required autofocus>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var errEl = document.getElementById('error');
  errEl.style.display = 'none';
  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    var data = await res.json();
    if (res.ok && data.token) {
      document.cookie = 'lg_session=' + data.token + '; path=/; SameSite=Strict';
      window.location.href = '/ui/index.html';
    } else {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
    }
  } catch (ex) {
    errEl.textContent = 'Connection error';
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
